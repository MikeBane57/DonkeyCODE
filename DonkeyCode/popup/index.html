<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DonkeyCode</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>DonkeyCode</h1>
      <p class="sub">Sessions and user scripts</p>
    </header>

    <nav class="tabs" role="tablist">
      <button type="button" class="tab active" data-tab="sessions" role="tab" aria-selected="true">
        Sessions
      </button>
      <button type="button" class="tab" data-tab="scripts" role="tab" aria-selected="false">
        Scripts
      </button>
    </nav>

    <section id="panel-sessions" class="panel active" role="tabpanel">
      <div class="row">
        <label for="session-name">Session name</label>
        <input id="session-name" type="text" placeholder="e.g. Morning ops" autocomplete="off" />
      </div>
      <div class="btn-row">
        <button type="button" id="btn-save-session">Save current layout</button>
        <button type="button" id="btn-refresh-sessions" class="secondary">Reload list</button>
      </div>
      <h2 class="section-title">Saved sessions</h2>
      <ul id="session-list" class="list"></ul>
      <p id="sessions-empty" class="hint hidden">No saved sessions yet.</p>
    </section>

    <section id="panel-scripts" class="panel" role="tabpanel" hidden>
      <div class="btn-row">
        <button type="button" id="btn-refresh-scripts">Refresh scripts</button>
      </div>
      <div class="row">
        <label for="script-source-url">Script source (GitHub API listing URL)</label>
        <input
          id="script-source-url"
          type="url"
          spellcheck="false"
          placeholder="https://api.github.com/repos/owner/repo/contents/?ref=main"
        />
        <button type="button" id="btn-apply-source" class="small">Apply &amp; reload</button>
      </div>
      <div class="row">
        <label for="extra-urls">Extra raw script URLs (one per line)</label>
        <textarea id="extra-urls" rows="3" placeholder="https://raw.githubusercontent.com/.../test-banner.user.js"></textarea>
        <button type="button" id="btn-apply-extra" class="small">Apply &amp; reload</button>
      </div>
      <p id="last-fetch" class="hint"></p>
      <h2 class="section-title">Scripts</h2>
      <ul id="script-list" class="list script-list"></ul>
      <p id="scripts-empty" class="hint hidden">No scripts loaded. Check the source URL or click Refresh.</p>
    </section>

    <p id="status" class="status" role="status"></p>

    <script src="popup.js"></script>
  </body>
</html>
