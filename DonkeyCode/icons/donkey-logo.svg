<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" fill="#f0f2f5"/>
  <!-- Stylized donkey head: readable at 16px -->
  <g transform="translate(64,72)">
    <!-- ears -->
    <path fill="#9aa0a8" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"
      d="M-38,-42 L-32,-78 L-18,-58 Z M38,-42 L32,-78 L18,-58 Z"/>
    <path fill="#e8e4dc" d="M-30,-68 L-24,-52 L-22,-56 Z M30,-68 L24,-52 L22,-56 Z"/>
    <!-- head -->
    <ellipse cx="0" cy="-8" rx="44" ry="40" fill="#b8bec4" stroke="#1a1a1a" stroke-width="3"/>
    <!-- muzzle -->
    <ellipse cx="0" cy="18" rx="28" ry="22" fill="#f2ebe3" stroke="#1a1a1a" stroke-width="3"/>
    <!-- eyes (happy arcs) -->
    <path fill="none" stroke="#1a1a1a" stroke-width="4" stroke-linecap="round"
      d="M-22,-12 Q-14,-4 -6,-12 M6,-12 Q14,-4 22,-12"/>
    <!-- nostrils -->
    <ellipse cx="-8" cy="22" rx="4" ry="6" fill="#1a1a1a"/>
    <ellipse cx="8" cy="22" rx="4" ry="6" fill="#1a1a1a"/>
    <!-- ear accent -->
    <circle cx="28" cy="-62" r="3" fill="#1a1a1a"/>
  </g>
</svg>
